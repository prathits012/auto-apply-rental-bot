[phases.setup]
aptPkgs = [
  "libasound2t64", "libatk1.0-0", "libatk-bridge2.0-0",
  "libcups2t64", "libdrm2", "libgbm1", "libgtk-3-0t64",
  "libnspr4", "libnss3", "libpango-1.0-0",
  "libx11-6", "libxcb1", "libxcomposite1", "libxcursor1",
  "libxdamage1", "libxext6", "libxfixes3", "libxi6",
  "libxrandr2", "libxrender1", "libxss1", "libxtst6",
  "xvfb", "fonts-liberation", "ca-certificates"
]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  "/opt/venv/bin/pip install -r requirements.txt",
  "/opt/venv/bin/playwright install chromium"
]

[start]
cmd = "python main.py"
